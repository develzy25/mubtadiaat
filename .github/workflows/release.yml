name: Release Multi-Platform

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'main'

jobs:
  build-windows:
    name: Build Web & Windows
    runs-on: windows-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      # 1. DEPLOY CLOUDFLARE PAGES (Admin PWA)
      - name: Build Admin Web
        working-directory: ./admin
        run: |
          npm ci
          npm run build

      - name: Deploy Admin to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages project create mubtadiaat --production-branch main || true
          npx wrangler@latest pages deploy ./admin/dist --project-name mubtadiaat --branch main

      # 2. BUILD WINDOWS DESKTOP INSTALLER (.EXE)
      - name: Build Windows Desktop App
        working-directory: ./admin
        run: |
          npm run build:windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. PUBLISH TO GITHUB RELEASES
      - name: Extract Version
        id: extract_version
        working-directory: ./admin
        shell: bash
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create GitHub Release (Windows)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: |
            admin/dist_electron/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Build Android APK
        working-directory: ./mobile
        run: |
          npm ci
          eas build --platform android --profile production --local --output ../mubtadiaat-android.apk

      - name: Extract Version
        id: extract_version
        working-directory: ./admin
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            mubtadiaat-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. CLEANUP OLD RELEASES (Run once Android is done)
      - name: Delete older releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
