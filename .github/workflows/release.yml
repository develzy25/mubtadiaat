name: Release Multi-Platform

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'main'

jobs:
  build-windows:
    name: Build Web & Windows
    runs-on: windows-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      # 1. DEPLOY CLOUDFLARE PAGES (Admin PWA)
      - name: Build Admin Web
        working-directory: ./admin
        run: |
          npm ci
          npm run build

      - name: Deploy Admin to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy ./admin/dist --project-name mubtadiaat --branch main
